    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan: #5CE1E6;
            --burgundy: #73203D;
            --red: #FF3B4F;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--burgundy);
            color: white;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
            margin: 0;
        }

        /* Contenedor de fondo animado */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .row {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .row-1,
        .row-3 {
            animation: slideRight 25s linear infinite;
        }

        .row-2,
        .row-4 {
            animation: slideLeft 25s linear infinite;
        }

        @keyframes slideRight {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(800px);
            }
        }

        @keyframes slideLeft {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-800px);
            }
        }

        /* TRAPECIOS REALES */
        .trapezoid {
            width: 200px;
            height: 100%;
            flex-shrink: 0;
            position: relative;
        }

        /* Burgundy trapezoid: ancho arriba, angosto abajo, lado derecho inclinado */
        .trapezoid-burgundy {
            background: var(--burgundy);
            clip-path: polygon(0 0, 100% 0, 75% 100%, 0 100%);
        }

        /* Red trapezoid: angosto arriba, ancho abajo, lado izquierdo inclinado */
        .trapezoid-red {
            background: var(--red);
            clip-path: polygon(25% 0, 100% 0, 100% 100%, 0 100%);
        }

        /* Contenedor de contenido */
        .content-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .content {
            text-align: center;
            max-width: 900px;
        }

        .logo {
            font-family: 'Work Sans', sans-serif;
            font-size: 42px;
            font-weight: 400;
            letter-spacing: 0px;
            color: white;
            margin-bottom: 20px;
            text-transform: lowercase;
        }

        .main-title {
            font-family: 'Anton', 'Impact', sans-serif;
            font-size: 140px;
            font-weight: 400;
            color: white;
            line-height: 0.95;
            margin-bottom: 40px;
            text-transform: lowercase;
            letter-spacing: -2px;
        }

        .tagline {
            font-family: 'Work Sans', sans-serif;
            font-size: 19px;
            line-height: 1.6;
            color: white;
            font-weight: 400;
            margin-bottom: 35px;
        }

        .contact {
            font-family: 'Work Sans', sans-serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--cyan);
            text-decoration: none;
            transition: opacity 0.3s ease;
            display: inline-block;
        }

        .contact:hover {
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-title {
                font-size: 110px;
            }

            .logo {
                font-size: 36px;
            }

            .tagline {
                font-size: 17px;
            }

            .contact {
                font-size: 22px;
            }
        }

        @media (max-width: 768px) {
            .content-container {
                padding: 40px 20px;
            }

            .main-title {
                font-size: 70px;
            }

            .logo {
                font-size: 28px;
            }

            .tagline {
                font-size: 15px;
            }

            .contact {
                font-size: 18px;
            }

            .trapezoid {
                width: 120px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 50px;
            }

            .logo {
                font-size: 24px;
            }

            .tagline {
                font-size: 14px;
            }

            .contact {
                font-size: 16px;
            }

            .trapezoid {
                width: 80px;
            }
        }
    </style>
</head>
